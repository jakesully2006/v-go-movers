<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="55%" stop-color="#d7e7f5"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb86b" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff8a00" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#163569"/>
      <stop offset="100%" stop-color="#0b1d44"/>
    </linearGradient>
    <linearGradient id="truckBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#183f86"/>
      <stop offset="100%" stop-color="#0a1d44"/>
    </linearGradient>
    <linearGradient id="truckShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#081226" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <circle cx="145" cy="160" r="220" fill="url(#glow)" filter="url(#blurSoft)"/>
  <circle cx="1180" cy="170" r="360" fill="#ffffff" opacity="0.8" filter="url(#blurSoft)"/>

  <!-- soft skyline -->
  <g opacity="0.15" fill="#1b335f">
    <rect x="1120" y="340" width="28" height="110" rx="3"/>
    <rect x="1160" y="300" width="36" height="150" rx="3"/>
    <rect x="1210" y="325" width="20" height="125" rx="3"/>
    <rect x="1240" y="285" width="52" height="165" rx="3"/>
    <rect x="1305" y="315" width="18" height="135" rx="3"/>
    <rect x="1335" y="295" width="30" height="155" rx="3"/>
    <rect x="1378" y="332" width="24" height="118" rx="3"/>
    <rect x="1416" y="305" width="44" height="145" rx="3"/>
  </g>

  <!-- warehouse -->
  <g filter="url(#shadow)">
    <rect x="885" y="350" width="360" height="150" rx="8" fill="#eff4fb"/>
    <rect x="950" y="316" width="180" height="40" rx="6" fill="#d8e2ef"/>
    <rect x="950" y="366" width="300" height="14" rx="7" fill="#ced8e6"/>
    <rect x="960" y="388" width="82" height="72" rx="4" fill="#ffffff"/>
    <rect x="1058" y="388" width="82" height="72" rx="4" fill="#ffffff"/>
    <rect x="1156" y="388" width="72" height="72" rx="4" fill="#ffffff"/>
    <path d="M915 350h330l-18-28H932l-17 28Z" fill="#c8d5e5"/>
    <image href="/logo.png" x="1015" y="252" width="180" height="78" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- road -->
  <path d="M0 760C210 708 330 610 500 540C700 458 860 432 980 430C1120 428 1230 450 1360 500C1450 535 1538 580 1600 640V900H0V760Z" fill="url(#road)"/>
  <path d="M0 744C206 695 332 602 500 530C690 448 860 423 980 420C1120 416 1232 438 1362 490" stroke="#ff9400" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
  <path d="M0 768C208 720 344 633 518 560C701 484 869 458 990 455C1130 452 1240 474 1380 526" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-dasharray="26 20" opacity="0.95"/>

  <!-- truck motion trails -->
  <path d="M980 560L1270 520" stroke="#ff8a00" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <path d="M1000 595L1338 553" stroke="#ff8a00" stroke-width="5" stroke-linecap="round" opacity="0.45"/>

  <!-- truck -->
  <g filter="url(#shadow)">
    <!-- trailer -->
    <rect x="420" y="360" width="500" height="175" rx="18" fill="#f7fbff"/>
    <rect x="435" y="373" width="470" height="148" rx="14" fill="#ffffff"/>
    <rect x="435" y="373" width="470" height="148" rx="14" fill="none" stroke="#d3dbea" stroke-width="3"/>
    <rect x="500" y="410" width="340" height="20" rx="10" fill="#e9eff8"/>
    <rect x="500" y="442" width="250" height="16" rx="8" fill="#e9eff8"/>
    <rect x="500" y="472" width="160" height="16" rx="8" fill="#e9eff8"/>
    <image href="/logo.png" x="565" y="392" width="250" height="96" preserveAspectRatio="xMidYMid meet"/>
    <!-- cab -->
    <path d="M920 400h120c35 0 62 27 62 62v73h-182v-135Z" fill="url(#truckBlue)"/>
    <path d="M940 416h78c23 0 42 19 42 42v77h-120v-119Z" fill="#0f2656"/>
    <path d="M955 427h62c18 0 32 14 32 32v58h-94v-90Z" fill="#173a7c"/>
    <path d="M999 461h54l12 56h-66v-56Z" fill="#214b93"/>
    <rect x="924" y="500" width="180" height="18" rx="9" fill="url(#truckShadow)"/>
    <path d="M1000 408h40c18 0 30 12 30 30v10h-70v-40Z" fill="#ecf5ff" opacity="0.95"/>
    <path d="M1043 448h28c6 0 10 5 10 10v20h-38v-30Z" fill="#0b1d44"/>
    <rect x="926" y="437" width="16" height="56" rx="6" fill="#f7fbff"/>
    <rect x="1111" y="445" width="10" height="72" rx="5" fill="#f7fbff" opacity="0.9"/>
    <!-- container line -->
    <rect x="420" y="355" width="500" height="7" rx="3.5" fill="#ff8a00"/>
  </g>

  <!-- wheels -->
  <g>
    <circle cx="545" cy="558" r="34" fill="#09162f"/>
    <circle cx="545" cy="558" r="18" fill="#d9e5f4"/>
    <circle cx="545" cy="558" r="8" fill="#09162f"/>
    <circle cx="795" cy="558" r="34" fill="#09162f"/>
    <circle cx="795" cy="558" r="18" fill="#d9e5f4"/>
    <circle cx="795" cy="558" r="8" fill="#09162f"/>
    <circle cx="986" cy="558" r="36" fill="#09162f"/>
    <circle cx="986" cy="558" r="19" fill="#d9e5f4"/>
    <circle cx="986" cy="558" r="8" fill="#09162f"/>
    <circle cx="1060" cy="558" r="36" fill="#09162f"/>
    <circle cx="1060" cy="558" r="19" fill="#d9e5f4"/>
    <circle cx="1060" cy="558" r="8" fill="#09162f"/>
    <circle cx="1118" cy="558" r="22" fill="#09162f"/>
    <circle cx="1118" cy="558" r="12" fill="#d9e5f4"/>
    <circle cx="1118" cy="558" r="5" fill="#09162f"/>
  </g>

  <!-- road edge and foreground blur -->
  <path d="M0 900C150 830 310 780 520 740C750 698 930 688 1140 692C1320 695 1460 712 1600 740V900H0Z" fill="#081226" opacity="0.35"/>
  <rect x="0" y="0" width="1600" height="900" fill="url(#glow)" opacity="0.09"/>

  <!-- brand badge -->
  <g filter="url(#shadow)">
    <rect x="38" y="28" width="300" height="136" rx="18" fill="#ffffff" opacity="0.95"/>
    <image href="/logo.png" x="54" y="40" width="272" height="112" preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>
